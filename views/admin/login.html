<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Alethia Decora</title>
    <link href="/css/admin.css" rel="stylesheet">
<style>
        /* Estilos específicos para centrar el login */
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--admin-light);
            padding: 1rem; /* Añadimos padding al body para que el "container" nunca toque los bordes */
        }
        .login-container {
            max-width: 400px;
            width: 100%;
            padding: 2rem;
            background-color: #fff;
            border-radius: 0.5rem;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);
            border-top: 4px solid var(--admin-primary);
        }
        .login-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .login-header h1 {
            font-family: 'Playfair Display', serif;
            color: var(--admin-primary-dark);
            font-size: 1.8rem;
            margin: 0;
        }
        .alert-danger {
            color: #721c24;
            background-color: #f8d7da;
            border-color: #f5c6cb;
            padding: 0.75rem 1.25rem;
            margin-bottom: 1rem;
            border: 1px solid transparent;
            border-radius: 0.25rem;
        }

        /* ======== INICIO DE LA MEJORA MÓVIL ======== */
        @media (max-width: 450px) {
            body {
                /* Quitamos el centrado vertical en móvil, se ve mejor arriba */
                align-items: flex-start; 
                /* Mantenemos el padding para que no pegue a los bordes */
                padding: 1rem; 
            }
            .login-container {
                /* Reducimos el padding interno para dar más espacio a los inputs */
                padding: 1.5rem; 
                /* Le damos un espacio desde arriba */
                margin-top: 2rem; 
            }
            .login-header h1 {
                font-size: 1.6rem; /* Achicamos un poco el título */
            }
        }
        /* ======== FIN DE LA MEJORA MÓVIL ======== */
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <h1>Alethia Decora</h1>
            <p class="text-muted">Panel Administrativo</p>
        </div>

        <% if (locals.error) { %>
            <div class="alert alert-danger"><%= error %></div>
        <% } %>

        <form action="/admin/login" method="POST">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" name="email" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg">Ingresar</button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
